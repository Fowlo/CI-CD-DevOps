  name: Dev pipeline

  on:
    push:
      branches: ['dev'] #déclenché sur push
    pull_request:
      branches: ['dev'] #déclenché sur PR

  jobs:
    #Job1 : lint
    lint:
      name: lint
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4 #clone le repo
        - uses: actions/setup-node@v4 #installe Node.js
          with:
            node-version: '20'
            cache: 'npm'
        - run: npm ci
        - run: npm run lint

  #Job2 : Tests unitaires
    test-unit:
      name: Tests unitaires
      runs-on: ubuntu-latest
      needs: lint # lance seulement si lint passe
      steps:
        - uses: actions/checkout@v4 #clone le repo
        - uses: actions/setup-node@v4 #installe Node.js
          with:
            node-version: '20'
            cache: 'npm'
        - name: installation des dépendances
          run: npm ci

        - name: Tests unitaires avec couverture
          run: npm run test -- --coverage

        - name: Upload rapport de couverture
          uses: actions/upload-artifact@v4
          with:
            name: coverage-report-prod
            path: coverage/
            retention-days: 30

    #Job3 : Tests intégration
    test-integration:
      name: Tests intégration
      runs-on: ubuntu-latest
      needs: test-unit # lance seulement si lint passe
      steps:
        - uses: actions/checkout@v4 #clone le repo
        - uses: actions/setup-node@v4 #installe Node.js
          with:
            node-version: '20'
            cache: 'npm'
        - name: installation des dépendances
          run: npm ci

        - name: Tests intégration
          run: npm run test
          env : 
            NODE_ENV: test

    
    #Job4 : Deploy
    Deploy:
      name: Deploy
      runs-on: ubuntu-latest
      needs: test-integration
      if: github.event_name == 'push'
      steps:
        - name: Deployer vers render
          run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"